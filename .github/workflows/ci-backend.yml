name: CI — Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/ci-backend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/ci-backend.yml'
  workflow_call:

jobs:
  build-and-test:
    name: Build, Test & Lint (.NET)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'

      - name: Restore dependencies
        run: dotnet restore backend/

      - name: Build
        run: dotnet build backend/ --no-restore -c Release

      - name: Run tests
        run: dotnet test backend/ --no-build -c Release --logger trx --results-directory TestResults/

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-backend
          path: TestResults/

      - name: Check formatting (CSharpier)
        run: |
          dotnet tool restore
          dotnet csharpier check backend/
